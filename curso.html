<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link id="favicon-link" rel="icon" href="" type="image/png">
<title id="page-title">Curso — Escola Bíblica</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --a:#f0c060;--ar:240,192,96;--a-bg:#f0c060;
  --bg:#080808;--bg2:#0f0f0f;--card:#111;--card2:#161616;
  --b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
  --t:#fff;--t2:rgba(255,255,255,.58);--t3:rgba(255,255,255,.28);
  --font:'SFNS Display','SF Pro Display','SF Pro Text',-apple-system,'Inter',sans-serif;
  --r:16px;--rs:10px;--rx:8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--t);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:5px}
img{display:block;max-width:100%}a{text-decoration:none;color:inherit}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 6%;
  background:rgba(8,8,8,.94);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b);
}
.nav-back{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:500;color:var(--t2);
  transition:color .2s;cursor:pointer;
}
.nav-back:hover{color:#fff}
.nav-back svg{width:16px;height:16px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-box{width:32px;height:32px;border-radius:8px;background:var(--a-bg);display:flex;align-items:center;justify-content:center}
.nav-logo-box svg{width:15px;height:15px}
.nav-brand{font-size:14px;font-weight:700;letter-spacing:-.02em;color:#fff}
.nav-brand span{font-size:9px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);display:block}

/* LOADING */
.loading{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  color:var(--t3);font-size:14px;
}
.loading-spinner{
  width:36px;height:36px;border:2px solid var(--b2);
  border-top-color:var(--a);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* HERO */
.course-hero{
  padding-top:68px;
  min-height:55vh;
  position:relative;
  overflow:hidden;
  display:flex;align-items:flex-end;
}
.hero-bg-cover{
  position:absolute;inset:0;
  background-size:cover;background-position:center top;
  filter:blur(60px) saturate(0.4);
  opacity:0.25;transform:scale(1.1);
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,8,.85) 50%,rgba(8,8,8,.6) 100%);
}
.hero-content{
  position:relative;z-index:2;
  width:100%;padding:60px 6% 48px;
  display:grid;grid-template-columns:280px 1fr;gap:48px;align-items:end;
}
@media(max-width:768px){.hero-content{grid-template-columns:1fr;gap:24px;padding:40px 5% 32px}}

/* COVER */
.course-cover{
  width:100%;aspect-ratio:4/5;
  border-radius:var(--r);overflow:hidden;
  background:var(--card2);
  box-shadow:0 32px 64px rgba(0,0,0,.6),0 0 0 1px var(--b);
  flex-shrink:0;
}
.course-cover img{width:100%;height:100%;object-fit:cover}
.course-cover-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--card2),rgba(var(--ar),.06));
  font-size:52px;opacity:.25;
}

/* HERO INFO */
.hero-info{}
.course-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--a);border:1px solid rgba(var(--ar),.3);
  background:rgba(var(--ar),.08);
  padding:5px 12px;border-radius:20px;margin-bottom:16px;
}
.course-title{
  font-size:clamp(28px,4vw,52px);font-weight:800;
  letter-spacing:-.03em;line-height:1.08;
  color:#fff;margin-bottom:14px;
}
.course-desc-short{
  font-size:17px;font-weight:400;line-height:1.7;
  color:var(--t2);margin-bottom:24px;max-width:580px;
}
.course-meta-row{
  display:flex;gap:20px;flex-wrap:wrap;margin-bottom:32px;
}
.course-meta-item{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:500;color:var(--t3);
  letter-spacing:.04em;text-transform:uppercase;
}
.course-meta-item svg{width:14px;height:14px;opacity:.5}

/* BUY BLOCK */
.buy-block{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.price-block{}
.price-old{font-size:13px;color:var(--t3);text-decoration:line-through;margin-bottom:3px}
.price-main{font-size:36px;font-weight:800;letter-spacing:-.03em;color:var(--a);line-height:1}
.btn-buy{
  display:inline-flex;align-items:center;gap:9px;
  font-family:var(--font);font-size:15px;font-weight:700;letter-spacing:-.01em;
  color:#000;background:var(--a-bg);
  padding:15px 36px;border-radius:var(--rs);
  transition:all .25s;
  box-shadow:0 6px 28px rgba(var(--ar),.35);
  border:none;cursor:pointer;
}
.btn-buy:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(var(--ar),.5);filter:brightness(1.08)}
.btn-buy svg{width:16px;height:16px}

/* BODY */
.course-body{
  max-width:960px;margin:0 auto;padding:60px 6%;
  display:grid;grid-template-columns:1fr 340px;gap:48px;align-items:start;
}
@media(max-width:900px){.course-body{grid-template-columns:1fr}}

.body-main{}

/* SECTION BLOCKS */
.body-section{margin-bottom:44px}
.body-section-title{
  font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--a);opacity:.8;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.body-section-title::after{
  content:'';flex:1;height:1px;background:var(--b);
}

/* DESCRIPTION */
.desc-long{
  font-size:16px;font-weight:400;line-height:1.85;
  color:var(--t2);
}

/* TOPICS */
.topics-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
@media(max-width:600px){.topics-grid{grid-template-columns:1fr}}
.topic-item{
  display:flex;align-items:flex-start;gap:10px;
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--rs);padding:12px 14px;
  font-size:13px;font-weight:400;color:var(--t2);line-height:1.5;
}
.topic-check{
  width:18px;height:18px;border-radius:50%;
  background:rgba(var(--ar),.15);border:1px solid rgba(var(--ar),.3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.topic-check svg{width:10px;height:10px;color:var(--a)}

/* MODULES */
.modules-list{display:flex;flex-direction:column;gap:8px}
.module-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--rs);padding:13px 16px;
  font-size:14px;font-weight:500;color:var(--t);
  transition:border-color .2s;
}
.module-item:hover{border-color:var(--b2)}
.module-num{
  width:28px;height:28px;border-radius:8px;
  background:rgba(var(--ar),.1);border:1px solid rgba(var(--ar),.2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--a);flex-shrink:0;
}

/* SIDEBAR STICKY CARD */
.sidebar-card{
  position:sticky;top:88px;
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);overflow:hidden;
}
.sidebar-cover{
  width:100%;aspect-ratio:4/5;overflow:hidden;
  background:var(--card2);
}
.sidebar-cover img{width:100%;height:100%;object-fit:cover}
.sidebar-cover-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;opacity:.15;
}
.sidebar-body{padding:20px}
.sidebar-price-old{font-size:12px;color:var(--t3);text-decoration:line-through;margin-bottom:4px}
.sidebar-price{font-size:30px;font-weight:800;letter-spacing:-.03em;color:var(--a);margin-bottom:18px}
.sidebar-buy{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;font-family:var(--font);font-size:14px;font-weight:700;
  color:#000;background:var(--a-bg);border:none;border-radius:var(--rs);
  padding:13px;cursor:pointer;transition:all .25s;
  box-shadow:0 4px 20px rgba(var(--ar),.3);margin-bottom:14px;
}
.sidebar-buy:hover{filter:brightness(1.08);transform:translateY(-1px)}
.sidebar-buy svg{width:15px;height:15px}
.sidebar-features{list-style:none;display:flex;flex-direction:column;gap:9px}
.sidebar-features li{
  display:flex;align-items:center;gap:9px;
  font-size:12px;color:var(--t2);
}
.sidebar-features li svg{width:14px;height:14px;color:var(--a);opacity:.7;flex-shrink:0}

/* NOT FOUND */
.not-found{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px;gap:12px;
}
.not-found h1{font-size:24px;font-weight:700;color:var(--t2)}
.not-found p{font-size:14px;color:var(--t3)}


/* INSTRUCTOR */
.instructor-card{
  display:flex;align-items:flex-start;gap:20px;
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);padding:24px;
}
.instructor-photo{
  width:72px;height:72px;border-radius:50%;overflow:hidden;
  background:var(--card2);flex-shrink:0;
  border:2px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.instructor-photo img{width:100%;height:100%;object-fit:cover}
.instructor-info{}
.instructor-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.instructor-title{font-size:12px;font-weight:500;color:var(--a);opacity:.8;margin-bottom:10px;letter-spacing:.02em}
.instructor-bio{font-size:14px;font-weight:400;line-height:1.75;color:var(--t2)}
/* REVEAL */
.rv{opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.rv.in{opacity:1;transform:none}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="nav">
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
    Todos os cursos
  </a>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box">
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 2v14M4.5 6.5h9M2 9h14" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <div>
      <div class="nav-brand" id="v-name">Escola Bíblica</div>
      <span id="v-slogan">Centro de Estudos</span>
    </div>
  </a>
</nav>

<!-- MAIN CONTENT (injected by JS) -->
<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    Carregando curso...
  </div>
</div>

<script>
const SK='escola_config_v2',CK='escola_courses_v2',HK='escola_hero_imgs_v1',CATK='escola_cats_v1';

async function loadData(){
  try{
    const r=await fetch('./data.json?t='+Date.now(),{cache:'no-store'});
    if(r.ok){const d=await r.json();if(d&&d.config)return d;}
  }catch{}
  return {
    config:(()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}})(),
    courses:(()=>{try{return JSON.parse(localStorage.getItem(CK)||'[]')}catch{return[]}})(),
  };
}

function txt(id,v){const e=document.getElementById(id);if(e&&v!=null)e.textContent=v}

async function init(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');

  const data=await loadData();
  const s=data.config||{};
  const courses=data.courses||[];

  // Apply branding
  const root=document.documentElement.style;
  if(s.accent){root.setProperty('--a-bg',s.accent);const sol=s.accent.includes('gradient')?(s.accent.match(/#[0-9a-fA-F]{6}/)||[])[0]||'#f0c060':s.accent;root.setProperty('--a',sol);root.setProperty('--ar',hexRgb(sol))}
  if(s.bg)root.setProperty('--bg',s.bg);
  if(s.font){root.setProperty('--font',s.font);document.body.style.fontFamily=s.font}
  txt('v-name',s.name||'Escola Bíblica');
  txt('v-slogan',s.slogan||'');
  // Logo
  if(s.logo){
    const lb=document.querySelector('.nav-logo-box');
    if(lb){const img=document.createElement('img');img.src=s.logo;img.style.cssText='max-height:36px;max-width:160px;object-fit:contain;display:block';lb.parentNode.replaceChild(img,lb)}
  }

  if(!id){showNotFound('Nenhum curso especificado.');return}

  const course=courses.find(c=>String(c.id)===String(id));
  if(!course){showNotFound('Curso não encontrado.');return}

  renderCourse(course, s);
}

function renderCourse(c, s){
  const siteName = s.siteTitle || s.name || 'Kerigma Academy';
  document.getElementById('page-title').textContent = (c.name||'Curso') + ' — ' + siteName;
  // Favicon
  if(s.favicon){
    let fl=document.getElementById('favicon-link');
    if(!fl){fl=document.createElement('link');fl.id='favicon-link';fl.rel='icon';document.head.appendChild(fl);}
    fl.href=s.favicon;
    fl.type=s.favicon.includes('svg')?'image/svg+xml':s.favicon.includes('ico')?'image/x-icon':'image/png';
  }

  const hasCover=!!c.cover;
  const hasTopics=Array.isArray(c.topics)&&c.topics.length;
  const hasModules=Array.isArray(c.modules)&&c.modules.length;
  const hasDescLong=c.descLong&&c.descLong.trim();

  const topicsHtml=hasTopics?`
    <div class="body-section rv">
      <div class="body-section-title">O que você vai aprender</div>
      <div class="topics-grid">
        ${c.topics.map(t=>`
          <div class="topic-item">
            <div class="topic-check">
              <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 5l2.5 2.5L8 3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            ${t}
          </div>`).join('')}
      </div>
    </div>`:''

  const modulesHtml=hasModules?`
    <div class="body-section rv">
      <div class="body-section-title">Conteúdo do curso</div>
      <div class="modules-list">
        ${c.modules.map((m,i)=>`
          <div class="module-item">
            <div class="module-num">${String(i+1).padStart(2,'0')}</div>
            ${m}
          </div>`).join('')}
      </div>
    </div>`:''

  const descHtml=hasDescLong?`
    <div class="body-section rv">
      <div class="body-section-title">Sobre o curso</div>
      <div class="desc-long">${c.descLong.replace(/\n/g,'<br>')}</div>
    </div>`:''

  // Instructor block
  const hasInstructor=s.instructorName&&s.instructorName.trim();
  const instructorHtml=hasInstructor?`
    <div class="body-section rv">
      <div class="body-section-title">Sobre o professor</div>
      <div class="instructor-card">
        <div class="instructor-photo">
          ${s.instructorPhoto?`<img src="${s.instructorPhoto}" alt="${s.instructorName}">`:'👤'}
        </div>
        <div class="instructor-info">
          <div class="instructor-name">${s.instructorName}</div>
          ${s.instructorTitle?`<div class="instructor-title">${s.instructorTitle}</div>`:''}
          ${s.instructorBio?`<div class="instructor-bio">${s.instructorBio.replace(/\n/g,'<br>')}</div>`:''}
        </div>
      </div>
    </div>`:'';

  const checkoutLink=c.link&&c.link!=='#'?c.link:'#';
  const targetAttr=c.link&&c.link!=='#'?'target="_blank" rel="noopener"':'';

  document.getElementById('app').innerHTML=`
    <!-- HERO -->
    <div class="course-hero">
      ${hasCover?`<div class="hero-bg-cover" style="background-image:url('${c.cover}')"></div>`:''}
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div>
          <div class="course-cover">
            ${hasCover?`<img src="${c.cover}" alt="${c.name}">`:`<div class="course-cover-ph">📚</div>`}
          </div>
        </div>
        <div class="hero-info">
          <div class="course-badge">${c.cat||'Curso'}</div>
          <h1 class="course-title">${c.name||''}</h1>
          ${c.desc?`<p class="course-desc-short">${c.desc}</p>`:''}
          <div class="course-meta-row">
            <span class="course-meta-item">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="5"/><path d="M7 4v3l2 2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Acesso vitalício
            </span>
            <span class="course-meta-item">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="10" height="8" rx="1.2"/><path d="M5 3V2M9 3V2"/></svg>
              Online · no seu ritmo
            </span>
            ${hasModules?`<span class="course-meta-item">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 4h10M2 7h7M2 10h5"/></svg>
              ${c.modules.length} módulo${c.modules.length!==1?'s':''}
            </span>`:''}
          </div>
          <div class="buy-block">
            <div class="price-block">
              ${c.oldPrice?`<div class="price-old">${c.oldPrice}</div>`:''}
              <div class="price-main">${c.price||'—'}</div>
            </div>
            <a class="btn-buy" href="${checkoutLink}" ${targetAttr}>
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="11.5" r="1"/><circle cx="10.5" cy="11.5" r="1"/><path d="M1 1h1.5l2 7h6l1.5-5H4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Comprar agora
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div class="course-body">
      <div class="body-main">
        ${topicsHtml}
        ${modulesHtml}
        ${descHtml}
        ${!hasTopics&&!hasModules&&!hasDescLong?`
          <div style="padding:48px 0;text-align:center;color:var(--t3)">
            <p style="font-size:14px">Detalhes completos em breve.<br>Clique em comprar para saber mais.</p>
          </div>`:''}
        ${instructorHtml}
      </div>

      <!-- SIDEBAR -->
      <div>
        <div class="sidebar-card rv">
          <div class="sidebar-cover">
            ${hasCover?`<img src="${c.cover}" alt="${c.name}">`:`<div class="sidebar-cover-ph">📚</div>`}
          </div>
          <div class="sidebar-body">
            ${c.oldPrice?`<div class="sidebar-price-old">${c.oldPrice}</div>`:''}
            <div class="sidebar-price">${c.price||'—'}</div>
            <a class="sidebar-buy" href="${checkoutLink}" ${targetAttr}>
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5.5" cy="11.5" r="1"/><circle cx="10.5" cy="11.5" r="1"/><path d="M1 1h1.5l2 7h6l1.5-5H4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Comprar agora
            </a>
            <ul class="sidebar-features">
              <li><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="5"/><path d="M7 4v3l2 2" stroke-linecap="round" stroke-linejoin="round"/></svg>Acesso vitalício</li>
              <li><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7 2l1.4 2.8 3.1.5-2.2 2.2.5 3.1L7 9.2l-2.8 1.4.5-3.1L2.5 5.3l3.1-.5z"/></svg>Certificado incluído</li>
              <li><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="2" width="10" height="10" rx="2"/><path d="M5 7h4M7 5v4" stroke-linecap="round"/></svg>Plataforma Kiwify</li>
              <li><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 11s1-3 5-3 5 3 5 3"/><circle cx="7" cy="5" r="2"/></svg>Suporte do professor</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  `;

  // Reveal animation
  const obs=new IntersectionObserver(entries=>entries.forEach((e,i)=>{
    if(e.isIntersecting){setTimeout(()=>e.target.classList.add('in'),i*80);obs.unobserve(e.target)}
  }),{threshold:.07});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
}

function showNotFound(msg){
  document.getElementById('app').innerHTML=`
    <div class="not-found">
      <div style="font-size:48px">📭</div>
      <h1>${msg}</h1>
      <p>Volte para a página inicial e explore nossos cursos.</p>
