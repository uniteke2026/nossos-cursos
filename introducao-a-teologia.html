<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:5px}
img{display:block;max-width:100%}a{text-decoration:none;color:inherit}

/* ── HERO ── */
.hero{position:relative;width:100%;padding:72px 5% 56px;overflow:hidden;min-height:auto}
.hero.has-bg{min-height:70vh;display:flex;align-items:flex-end;padding-bottom:64px}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;z-index:0}
.hero-bg.desk{display:block}
.hero-bg.mob{display:none}
.hero-grad{position:absolute;inset:0;z-index:1;background:linear-gradient(to right,rgba(8,8,8,.95) 0%,rgba(8,8,8,.8) 40%,rgba(8,8,8,.4) 65%,rgba(8,8,8,.15) 100%)}
.hero-gradb{position:absolute;bottom:0;left:0;right:0;height:200px;z-index:1;background:linear-gradient(to top,var(--bg),transparent)}
.hero::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(var(--gr1),.08) 0%,transparent 70%);pointer-events:none;z-index:1}
.hero-inner{max-width:680px;position:relative;z-index:2}
.hero h1{font-size:clamp(28px,4.5vw,52px);font-weight:800;line-height:1.1;letter-spacing:-.04em;margin-bottom:16px}
.hero h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(14px,1.8vw,17px);font-weight:400;line-height:1.7;color:rgba(255,255,255,.58);max-width:520px}
.hero-stats{display:flex;gap:32px;margin-top:28px;flex-wrap:wrap}
.hero-stat strong{font-size:22px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.03em;display:block}
.hero-stat small{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28)}

/* ── LESSONS ── */
.lessons{padding:0 5% 72px}
.lessons-head{margin-bottom:28px}
.le{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;display:inline-block}
.lh{font-size:clamp(20px,2.8vw,28px);font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.ls{font-size:13px;color:rgba(255,255,255,.28)}

/* ── CARDS 320×480 ── */
.l-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.l-card{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:320/480;cursor:pointer;background:var(--card);border:1px solid rgba(255,255,255,.08);transition:transform .45s cubic-bezier(.16,1,.3,1),box-shadow .45s,border-color .3s}
.l-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 28px 60px rgba(0,0,0,.8),0 0 0 1px var(--g2a);border-color:var(--g2a)}
.l-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.l-card:hover .l-bg{transform:scale(1.06)}
.l-ph{position:absolute;inset:0;background:linear-gradient(160deg,#151520,rgba(var(--gr1),.06));display:flex;align-items:center;justify-content:center}
.l-ph svg{width:48px;height:48px;color:rgba(255,255,255,.06)}
.l-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 35%,rgba(0,0,0,.05) 60%,transparent 100%);pointer-events:none;z-index:1}
.l-lock{position:absolute;inset:0;z-index:2;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:background .3s}
.l-card:hover .l-lock{background:rgba(0,0,0,.2)}
.l-li{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.l-li svg{width:18px;height:18px;color:rgba(255,255,255,.6)}
.l-unlock{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.l-txt{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:20px}
.l-mod{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;display:inline-block}
.l-t{font-size:clamp(16px,2vw,22px);font-weight:800;letter-spacing:-.03em;line-height:1.2;color:#fff;white-space:pre-line;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.l-d{margin-top:8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:4px}
.l-d svg{width:11px;height:11px;opacity:.5}

/* ── PROFESSOR ── */
.prof-sec{padding:72px 5%;background:var(--bg2)}
.prof-in{max-width:800px;margin:0 auto}
.prof-sec .le{text-align:center}
.prof-sec .lh{text-align:center;margin-bottom:28px}
.prof-card{display:flex;align-items:flex-start;gap:32px;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px}
.prof-photo{width:96px;height:96px;border-radius:50%;overflow:hidden;background:#1a1a1a;flex-shrink:0;border:3px solid var(--g2a);display:flex;align-items:center;justify-content:center}
.prof-photo img{width:100%;height:100%;object-fit:cover}
.prof-photo svg{width:36px;height:36px;color:rgba(255,255,255,.12)}
.prof-name{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.prof-title{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;display:inline-block}
.prof-bio{font-size:15px;font-weight:400;line-height:1.8;color:rgba(255,255,255,.58)}
.prof-creds{display:flex;gap:20px;flex-wrap:wrap;margin-top:18px}
.prof-cred{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;padding-left:12px}
.prof-cred::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--gto);opacity:.5}

/* ── FOOTER ── */
.footer{background:#050505;border-top:1px solid rgba(255,255,255,.08);padding:28px 5%}
.f-copy{font-size:11px;color:rgba(255,255,255,.2);text-align:center}

/* ── POPUP ── */
.pop-ov{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px}
.pop-ov.show{display:flex}
.pop{background:#111;border:1px solid rgba(255,255,255,.12);border-radius:20px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.8);animation:popIn .4s cubic-bezier(.16,1,.3,1);position:relative}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(24px)}to{opacity:1;transform:none}}
.pop-top{padding:28px 28px 0;text-align:center}
.pop-ico{width:52px;height:52px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,rgba(var(--gr1),.15),rgba(var(--gr2),.15));border:1px solid rgba(var(--gr2),.25);display:flex;align-items:center;justify-content:center}
.pop-ico svg{width:22px;height:22px;color:var(--gto)}
.pop-h{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.pop-s{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:24px}
.pop-form{padding:0 28px 28px;display:flex;flex-direction:column;gap:12px}
.pop-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.pop-inp{font-family:var(--font);font-size:14px;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s;margin-top:4px;width:100%}
.pop-inp::placeholder{color:rgba(255,255,255,.25)}
.pop-inp:focus{border-color:var(--g2a);box-shadow:0 0 0 3px rgba(var(--gr2),.1)}
.pop-btn{font-family:var(--font);font-size:14px;font-weight:700;color:#fff;background:var(--grad);border:none;border-radius:10px;padding:14px;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(var(--gr1),.3);margin-top:4px}
.pop-btn:hover{filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 8px 30px rgba(var(--gr1),.45)}
.pop-priv{font-size:10px;color:rgba(255,255,255,.28);text-align:center;line-height:1.6;margin-top:4px}
.pop-x{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:20px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s;z-index:5}
.pop-x:hover{color:#fff;background:rgba(255,255,255,.08)}
.pop-loading{display:none;text-align:center;padding:20px;font-size:13px;color:rgba(255,255,255,.5)}
.pop-loading.show{display:block}
.pop-form.hide{display:none}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(16px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.rv.in{opacity:1;transform:none}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .l-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .hero{padding:48px 4% 40px}
  .hero-bg.desk{display:none}
  .hero-bg.mob{display:block}
  .hero-grad{background:linear-gradient(to top,rgba(8,8,8,.98) 0%,rgba(8,8,8,.7) 45%,rgba(8,8,8,.3) 70%,transparent 100%)}
  .hero.has-bg{min-height:60vh}
  .hero-stats{gap:20px}
  .lessons{padding:0 4% 56px}
  .l-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .l-t{font-size:15px}
  .l-txt{padding:14px}
  .l-mod{font-size:8px}
  .prof-sec{padding:52px 4%}
  .prof-card{flex-direction:column;align-items:center;text-align:center;gap:20px;padding:24px}
  .prof-photo{width:80px;height:80px}
  .prof-name{font-size:17px}
  .prof-bio{font-size:14px}
  .prof-creds{justify-content:center}
  .footer{padding:20px 4%}
  .pop{max-width:100%;border-radius:16px}
  .pop-top{padding:24px 20px 0}
  .pop-form{padding:0 20px 24px}
}
@media(max-width:480px){
  .hero{padding:36px 4% 32px}
  .hero h1{font-size:26px}
  .hero p{font-size:13px}
  .l-grid{grid-template-columns:1fr 1fr;gap:8px}
  .l-t{font-size:14px}
  .l-txt{padding:12px}
  .l-li{width:36px;height:36px}
  .l-li svg{width:15px;height:15px}
  .prof-card{padding:20px}
  .prof-bio{font-size:13px}
  .prof-creds{gap:14px}
}
@media(max-width:360px){
  .hero h1{font-size:22px}
  .hero-stats{gap:16px}
  .hero-stat strong{font-size:18px}
  .l-t{font-size:13px}
}
</style>

<div id="app"></div>

<script>
(function(){
  const C=CONFIG;

  // Parse gradient colors to RGB
  function hexRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'109,38,38'}

  const gr1=hexRgb(C.gradientFrom), gr2=hexRgb(C.gradientTo);

  document.documentElement.style.cssText=`
    --grad:linear-gradient(135deg,${C.gradientFrom},${C.gradientTo});
    --gfrom:${C.gradientFrom};--gto:${C.gradientTo};
    --gr1:${gr1};--gr2:${gr2};
    --g2a:rgba(${gr2},.35);
    --bg:${C.bgColor};--bg2:${C.bgColor2};
    --card:${C.cardBg};--font:${C.fontFamily}`;
  document.body.style.cssText=`font-family:${C.fontFamily};background:${C.bgColor}`;

  const I={
    lock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
    clock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,
    user:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    film:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"/></svg>`,
  };

  const cards=C.lessons.map((l,i)=>{
    const bg=l.image?`<div class="l-bg" style="background-image:url('${l.image}')"></div>`:`<div class="l-ph">${I.film}</div>`;
    return`<div class="l-card rv" onclick="openPopup()">${bg}<div class="l-lock"><div class="l-li">${I.lock}</div><span class="l-unlock">Clique para Desbloquear</span></div><div class="l-txt"><div class="l-mod">${l.module}</div><div class="l-t">${l.title}</div><div class="l-d">${I.clock} ${l.duration}</div></div></div>`;
  }).join('');

  const stats=C.heroStats.map(s=>`<div class="hero-stat"><strong>${s.number}</strong><small>${s.label}</small></div>`).join('');
  const creds=C.profCredentials.map(c=>`<span class="prof-cred">${c}</span>`).join('');
  const profPh=C.profPhoto?`<img src="${C.profPhoto}" alt="${C.profName}">`:`${I.user}`;

  const hasBg = C.heroImageDesktop || C.heroImageMobile;
  const heroBg = hasBg ? `
    ${C.heroImageDesktop ? `<div class="hero-bg desk" style="background-image:url('${C.heroImageDesktop}')"></div>` : ''}
    ${C.heroImageMobile ? `<div class="hero-bg mob" style="background-image:url('${C.heroImageMobile}')"></div>` : ''}
    <div class="hero-grad"></div><div class="hero-gradb"></div>` : '';

  document.getElementById('app').innerHTML=`
  <section class="hero${hasBg?' has-bg':''}">${heroBg}<div class="hero-inner rv">
    <h1>${C.heroTitle}</h1>
    <p>${C.heroText}</p>
    <div class="hero-stats">${stats}</div>
  </div></section>

  <section class="lessons">
    <div class="lessons-head rv">
      <div class="le">${C.lessonsEyebrow}</div>
      <div class="lh">${C.lessonsTitle}</div>
      <div class="ls">${C.lessonsSub}</div>
    </div>
    <div class="l-grid">${cards}</div>
  </section>

  <section class="prof-sec"><div class="prof-in rv">
    <div class="le">${C.profEyebrow}</div>
    <div class="lh">${C.profHeading}</div>
    <div class="prof-card">
      <div class="prof-photo">${profPh}</div>
      <div>
        <div class="prof-name">${C.profName}</div>
        <div class="prof-title">${C.profTitle}</div>
        <div class="prof-bio">${C.profBio}</div>
        <div class="prof-creds">${creds}</div>
      </div>
    </div>
  </div></section>

  <footer class="footer">
    <div class="f-copy">${C.footerText}</div>
  </footer>

  <div class="pop-ov" id="po" onclick="closePopup(event)">
    <div class="pop" onclick="event.stopPropagation()">
      <button class="pop-x" onclick="closePopup()">&times;</button>
      <div class="pop-top">
        <div class="pop-ico">${I.lock}</div>
        <div class="pop-h">${C.popupTitle}</div>
        <div class="pop-s">${C.popupSub}</div>
      </div>
      <div class="pop-form" id="popForm">
        <div><label class="pop-lbl">Seu nome</label><input class="pop-inp" type="text" placeholder="Ex: João Silva" id="ln"></div>
        <div><label class="pop-lbl">Seu melhor e-mail</label><input class="pop-inp" type="email" placeholder="joao@email.com" id="le"></div>
        <div><label class="pop-lbl">WhatsApp</label><input class="pop-inp" type="tel" placeholder="(11) 99999-9999" id="lp"></div>
        <button class="pop-btn" id="popSubmit" onclick="submitLead()">${C.popupBtn}</button>
        <div class="pop-priv">${C.popupPrivacy}</div>
      </div>
      <div class="pop-loading" id="popLoading">Enviando seus dados...</div>
    </div>
  </div>`;

  // Phone mask
  document.getElementById('lp').addEventListener('input',function(){
    let v=this.value.replace(/\D/g,'');
    if(v.length>11)v=v.slice(0,11);
    if(v.length>6)v=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if(v.length>2)v=`(${v.slice(0,2)}) ${v.slice(2)}`;
    else if(v.length>0)v=`(${v}`;
    this.value=v;
  });

  // Reveal
  const obs=new IntersectionObserver(es=>es.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('in'),i*80);obs.unobserve(e.target)}}),{threshold:.07});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));

  // Pixel
  if(C.metaPixelId){!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init',C.metaPixelId);fbq('track','PageView')}
})();

function openPopup(){
  document.getElementById('po').classList.add('show');
  document.body.style.overflow='hidden';
  // Reset form state
  document.getElementById('popForm').classList.remove('hide');
  document.getElementById('popLoading').classList.remove('show');
  if(typeof fbq!=='undefined')fbq('trackCustom','AbriuFormulario');
}
function closePopup(e){
  if(e&&e.target!==document.getElementById('po'))return;
  document.getElementById('po').classList.remove('show');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});

async function submitLead(){
  const nome=document.getElementById('ln').value.trim();
  const email=document.getElementById('le').value.trim();
  const whatsapp=document.getElementById('lp').value.trim();

  if(!nome||!email){alert('Preencha pelo menos nome e e-mail.');return}

  const btn=document.getElementById('popSubmit');
  btn.disabled=true;btn.textContent='Enviando...';

  // Send to Google Sheets
  const url=CONFIG.googleSheetsUrl;
  if(url){
    try{
      document.getElementById('popForm').classList.add('hide');
      document.getElementById('popLoading').classList.add('show');
      await fetch(url,{
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({nome,email,whatsapp})
      });
    }catch(err){console.error('Sheets error:',err)}
  }else{
    console.log('Lead (sem Sheets configurado):',{nome,email,whatsapp});
  }

  if(typeof fbq!=='undefined')fbq('trackCustom','LeadCapturado',{name:nome,email});

  // Success state
  document.getElementById('popLoading').classList.remove('show');
  document.getElementById('popForm').classList.remove('hide');
  document.getElementById('popForm').innerHTML=`
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">Acesso Liberado!</div>
      <div style="font-size:13px;color:rgba(255,255,255,.5);line-height:1.6">Você receberá os links das aulas no seu e-mail em instantes.</div>
    </div>`;

  setTimeout(()=>closePopup(),3000);
}
</script>
